<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傷心欲絕 2025 - 音響配線挑戰賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-box {
            position: relative;
            border: 4px solid #1e293b;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            width: 600px;
            height: 400px;
        }
        canvas { display: block; border-radius: 8px; }
        .hud {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            padding: 0 10px;
        }
        .target-box {
            background: #0ea5e9;
            color: #000;
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: 800;
            font-style: italic;
        }
        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
            padding: 20px;
        }
        /* 修正頭像容器與圖片樣式 */
        .boss-container {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .boss-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #ef4444;
            /* 關鍵：確保圖片比例正確且不超出圓框 */
            object-fit: cover; 
            object-position: center;
            background: #1e293b;
            display: block;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }
        .mistake-tag {
            background: #ef4444;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 900;
            padding: 4px 24px;
            transform: rotate(-2deg);
            margin-bottom: 15px;
            white-space: nowrap;
            box-shadow: 4px 4px 0 #7f1d1d;
        }
        .retry-btn {
            background: #fff;
            color: #000;
            padding: 8px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .retry-btn:hover { 
            background: #cbd5e1; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="hud">
        <div>
            <div class="text-xs text-slate-500 uppercase font-bold tracking-widest">Current Target</div>
            <div id="target-name" class="text-xl font-black text-cyan-400">OH L</div>
        </div>
        <div id="target-ch" class="target-box">CH 1</div>
    </div>

    <div id="game-box">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div id="game-over">
            <div class="boss-container">
                <img id="boss-pic" class="boss-frame" src="" alt="">
                <div id="no-pic" class="w-full h-full rounded-full border-4 border-dashed border-slate-700 flex items-center justify-center text-slate-600 text-xs text-center p-4">
                    尚未設定<br>主管照片
                </div>
            </div>
            <div class="mistake-tag">YOU ARE A MISTAKE</div>
            <div id="reason" class="text-slate-400 text-sm mb-6 px-10 text-center italic"></div>
            <button class="retry-btn" onclick="reset()">RETRY PATCHING</button>
        </div>
    </div>

    <input type="file" id="upload" accept="image/*" class="hidden" onchange="savePic(event)">
    <div class="mt-8 text-slate-600 text-xs flex items-center gap-6">
        <button onclick="document.getElementById('upload').click()" class="flex items-center gap-2 hover:text-slate-300 transition-colors">
            <span class="text-base">📁</span> 設定主管照片 (支援各種比例)
        </button>
        <span class="opacity-30">|</span>
        <span>[WASD / 方向鍵] 控制線路</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bossPic = document.getElementById('boss-pic');
        const noPic = document.getElementById('no-pic');
        
        function savePic(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    localStorage.setItem('boss', ev.target.result);
                    loadPic();
                };
                reader.readAsDataURL(file);
            }
        }

        function loadPic() {
            const data = localStorage.getItem('boss');
            if (data) {
                bossPic.src = data;
                bossPic.style.display = 'block';
                noPic.style.display = 'none';
            } else {
                bossPic.style.display = 'none';
                noPic.style.display = 'flex';
            }
        }

        const channelList = [
            { id: 1, name: "OH L" }, { id: 2, name: "OH R" }, { id: 3, name: "Ride" },
            { id: 4, name: "Floor Tom" }, { id: 5, name: "Rack Tom" }, { id: 6, name: "Hi-Hat" },
            { id: 7, name: "Snare Top" }, { id: 8, name: "Snare bottom" }, { id: 9, name: "Kick in" },
            { id: 10, name: "Kick out" }, { id: 11, name: "PGM L" }, { id: 12, name: "PGM R" },
            { id: 13, name: "PGM Click" }, { id: 20, name: "Vocal (正泰)" }, { id: 21, name: "Vocal (靖剛)" },
            { id: 22, name: "Vocal (馬摳)" }, { id: 23, name: "Vocal (阿祖)" }, { id: 24, name: "Vocal (冠甫)" }
        ];

        let snake = [], dx = 1, dy = 0, targetIdx = 0, food = {}, decoys = [], loop, changingDir = false;

        function reset() {
            snake = [{x:10, y:10, label:"Patch"}];
            dx = 1; dy = 0; targetIdx = 0;
            document.getElementById('game-over').style.display = 'none';
            spawn();
            updateUI();
            if (loop) clearInterval(loop);
            loop = setInterval(step, 110);
            loadPic();
        }

        function spawn() {
            const t = channelList[targetIdx];
            // 避免生成在邊界
            food = { x: rand(28)+1, y: rand(18)+1, id: t.id, name: t.name };
            decoys = [];
            while(decoys.length < 3) {
                let r = channelList[Math.floor(Math.random()*channelList.length)];
                if(r.id !== t.id) decoys.push({ x: rand(28)+1, y: rand(18)+1, id: r.id, name: r.name });
            }
        }

        function rand(max) { return Math.floor(Math.random() * max); }

        function updateUI() {
            const t = channelList[targetIdx];
            document.getElementById('target-name').innerText = t.name;
            document.getElementById('target-ch').innerText = `CH ${t.id}`;
        }

        function step() {
            changingDir = false;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x<0 || head.x>=30 || head.y<0 || head.y>=20) return fail("導線拉出舞台了！主管看著你。");
            if (snake.some(p => p.x === head.x && p.y === head.y)) return fail("線材打結了！這是在纏毛線嗎？");

            if (head.x === food.x && head.y === food.y) {
                head.label = food.name;
                snake.unshift(head);
                targetIdx = (targetIdx + 1) % channelList.length;
                spawn(); updateUI();
            } else {
                let d = decoys.find(i => i.x === head.x && i.y === head.y);
                if (d) return fail(`配錯線！主管要的是 CH ${food.id}，你接成了 CH ${d.id} (${d.name})`);
                head.label = snake[0].label;
                snake.unshift(head);
                snake.pop();
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,400);
            
            // 畫格線底圖
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<30; i++) { ctx.beginPath(); ctx.moveTo(i*20,0); ctx.lineTo(i*20,400); ctx.stroke(); }
            for(let i=0; i<20; i++) { ctx.beginPath(); ctx.moveTo(0,i*20); ctx.lineTo(600,i*20); ctx.stroke(); }

            drawItem(food, '#0ea5e9', true);
            decoys.forEach(d => drawItem(d, '#f59e0b', false));
            
            snake.forEach((p, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#fff' : '#334155';
                
                // 圓角矩形
                const r = isHead ? 6 : 4;
                ctx.beginPath();
                ctx.roundRect(p.x*20+1, p.y*20+1, 18, 18, r);
                ctx.fill();

                if(i>0 && i%2===0) {
                    ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 8px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.label.slice(0,4), p.x*20+10, p.y*20+12);
                }
            });
        }

        function drawItem(n, c, isTarget) {
            if(isTarget) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = c;
            }
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(n.x*20+10, n.y*20+10, 8, 0, 7); ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#000'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(n.id, n.x*20+10, n.y*20+14);
        }

        function fail(r) {
            clearInterval(loop);
            document.getElementById('reason').innerText = r;
            document.getElementById('game-over').style.display = 'flex';
        }

        window.onkeydown = e => {
            if(changingDir) return;
            const k = e.key.toLowerCase();
            if ((k==='w'||k==='arrowup') && dy===0) {dx=0; dy=-1; changingDir=true;}
            if ((k==='s'||k==='arrowdown') && dy===0) {dx=0; dy=1; changingDir=true;}
            if ((k==='a'||k==='arrowleft') && dx===0) {dx=-1; dy=0; changingDir=true;}
            if ((k==='d'||k==='arrowright') && dx===0) {dx=1; dy=0; changingDir=true;}
        };

        window.onload = reset;
    </script>
</body>
</html>
